name: Test and publish

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-sqlite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test with SQLite
        run: bun test

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: beats
          POSTGRES_PASSWORD: beats
          POSTGRES_DB: beats
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U beats"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test with PostgreSQL
        run: bun test
        env:
          TEST_DATABASE_URL: postgres://beats:beats@localhost:5432/beats

  publish:
    if: github.event_name == 'push'
    needs: [test-sqlite, test-postgres]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.sha.outputs.short }}
