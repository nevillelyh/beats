name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-sqlite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test with SQLite
        run: bun test

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: beats
          POSTGRES_PASSWORD: beats
          POSTGRES_DB: beats
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U beats"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test with PostgreSQL
        run: bun test
        env:
          TEST_DATABASE_URL: postgres://beats:beats@postgres:5432/beats

  build:
    if: github.event_name == 'push'
    needs: [test-sqlite, test-postgres]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Login to Gitea Container Registry
        uses: docker/login-action@v4
        with:
          registry: gitea.home.lyh.me
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            gitea.home.lyh.me/${{ github.repository }}:latest
            gitea.home.lyh.me/${{ github.repository }}:${{ steps.sha.outputs.short }}
