<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RPM Heatmap</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/heatmap.css" />
    <script type="module" src="/heatmap.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="title-row">
          <h1 class="title">RPM Heatmap</h1>
          <a class="btn btn-small" href="/">Back</a>
        </div>
      </div>

      <div class="card heatmap-card">
        <div class="heatmap-meta">
          <div id="heatmapSummary" class="muted">Loading...</div>
          <div class="heatmap-legend">
            <span class="muted">Less</span>
            <span class="pixel level-0"></span>
            <span class="pixel level-1"></span>
            <span class="pixel level-2"></span>
            <span class="pixel level-3"></span>
            <span class="pixel level-4"></span>
            <span class="muted">More</span>
          </div>
        </div>
        <div class="heatmap-wrap">
          <div class="heatmap-chart" aria-label="Practice session heatmap">
            <div class="heatmap-month-spacer"></div>
            <div id="heatmapMonthAxis" class="heatmap-month-axis" aria-hidden="true"></div>
            <div id="heatmapWeekdayAxis" class="heatmap-weekday-axis" aria-hidden="true"></div>
            <div id="heatmapGrid" class="heatmap-grid"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
