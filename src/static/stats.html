<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RPMs - Stats</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/stats.css" />
    <script type="module" src="/stats.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="title-row">
          <h1 class="title">RPMs</h1>
          <div class="page-tabs">
            <a class="btn btn-small" href="/">Tracker</a>
            <a class="btn btn-small" href="/trends.html">Trends</a>
            <a class="btn btn-small btn-primary" href="/stats.html">Stats</a>
          </div>
        </div>
      </div>

      <div id="statsPageError" class="muted"></div>
      <div class="stats-two-col">
        <div class="card stats-bars-card">
          <div class="bars-section">
            <h3 class="bars-title">Progress</h3>
            <div class="bars-plot">
              <div id="progressYAxis" class="bars-y-axis"></div>
              <div id="progressBars" class="bars-chart"></div>
            </div>
          </div>
        </div>

        <div class="card stats-bars-card">
          <div class="bars-section">
            <h3 class="bars-title">Session Deltas</h3>
            <div class="bars-plot">
              <div id="histDeltasYAxis" class="bars-y-axis"></div>
              <div id="histDeltasBars" class="bars-chart"></div>
            </div>
          </div>
        </div>

        <div class="card stats-bars-card">
          <div class="bars-section">
            <h3 class="bars-title">Sessions To Completion</h3>
            <div class="bars-plot">
              <div id="histSessionsYAxis" class="bars-y-axis"></div>
              <div id="histSessionsBars" class="bars-chart"></div>
            </div>
          </div>
        </div>

        <div class="card stats-bars-card">
          <div class="bars-section">
            <h3 class="bars-title">Days To Completion</h3>
            <div class="bars-plot">
              <div id="histDaysYAxis" class="bars-y-axis"></div>
              <div id="histDaysBars" class="bars-chart"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
